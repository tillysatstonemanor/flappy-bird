<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Flappy Bird</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #4ec0ca;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    user-select: none;
    color: #fff;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    gap: 10px;
  }
  #wrap {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  #game {
    background: #4ec0ca;
    display: block;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    border-radius: 6px;
    cursor: pointer;
  }
  #panel {
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(6px);
    padding: 14px 16px;
    border-radius: 12px;
    width: 240px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    max-height: 600px;
    overflow-y: auto;
  }
  #panel h2 {
    margin: 0 0 10px 0;
    font-size: 18px;
    letter-spacing: 1px;
    text-align: center;
  }
  #preview {
    display: block;
    margin: 0 auto 12px;
    background: linear-gradient(180deg, #70c5ce, #bce8f0);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  details.section {
    margin: 6px 0;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    overflow: hidden;
  }
  details.section[open] { background: rgba(255,255,255,0.08); }
  details.section > summary {
    list-style: none;
    cursor: pointer;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    user-select: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  details.section > summary::-webkit-details-marker { display: none; }
  details.section > summary::after {
    content: '▾';
    transition: transform 0.2s;
    opacity: 0.6;
  }
  details.section[open] > summary::after { transform: rotate(180deg); }
  .section-body {
    padding: 4px 12px 12px;
  }
  .hat-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 8px;
  }
  .hat-tab {
    padding: 4px 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 999px;
    cursor: pointer;
    font-size: 11px;
  }
  .hat-tab.active {
    background: rgba(255,255,255,0.3);
    border-color: #fff;
  }
  .hat-tab:hover { background: rgba(255,255,255,0.18); }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 10px 0;
    font-size: 13px;
  }
  .row label { opacity: 0.85; }
  .swatches {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-top: 6px;
  }
  .swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    cursor: pointer;
    transition: transform 0.1s, border-color 0.15s;
  }
  .swatch:hover { transform: scale(1.1); }
  .swatch.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.4); }
  .styles {
    display: flex;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .style-btn {
    flex: 1 1 45%;
    padding: 6px 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .style-btn.active {
    background: rgba(255,255,255,0.3);
    border-color: #fff;
  }
  .style-btn:hover { background: rgba(255,255,255,0.2); }
  input[type="color"] {
    background: transparent;
    border: none;
    width: 36px;
    height: 28px;
    cursor: pointer;
  }
  .toggle {
    position: relative;
    width: 40px; height: 22px;
    background: rgba(255,255,255,0.2);
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle.on { background: #6fce5f; }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    transition: left 0.2s;
  }
  .toggle.on::after { left: 20px; }
  input[type="range"] { width: 90px; }
  #hint {
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    letter-spacing: 1px;
  }
  #leaderboard {
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(6px);
    padding: 16px 18px;
    border-radius: 12px;
    width: 220px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    color: #fff;
  }
  #leaderboard h2 { margin: 0 0 10px 0; font-size: 18px; letter-spacing: 1px; }
  #nameInput {
    width: 100%;
    box-sizing: border-box;
    padding: 6px 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    font-size: 13px;
    margin-bottom: 10px;
  }
  #nameInput::placeholder { color: rgba(255,255,255,0.5); }
  #lbList { list-style: none; margin: 0; padding: 0; font-size: 13px; max-height: 320px; overflow-y: auto; }
  #lbList li {
    display: flex;
    justify-content: space-between;
    padding: 4px 6px;
    border-radius: 4px;
  }
  #lbList li:nth-child(odd) { background: rgba(255,255,255,0.06); }
  #lbList li.me { background: rgba(255,215,0,0.25); font-weight: bold; }
  #lbList .rank { opacity: 0.7; width: 24px; }
  #lbList .name { flex: 1; padding: 0 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #lbList .score { font-variant-numeric: tabular-nums; }
  #lbList canvas.avatar { display: block; flex-shrink: 0; image-rendering: -moz-crisp-edges; }
  #lbStatus { font-size: 11px; opacity: 0.6; margin-top: 8px; text-align: center; }
  #refreshBtn {
    width: 100%;
    margin-top: 8px;
    padding: 6px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  #refreshBtn:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>
<div id="wrap">
  <div id="leaderboard">
    <h2>Leaderboard</h2>
    <input id="nameInput" placeholder="Your name" maxlength="16" />
    <ol id="lbList"></ol>
    <button id="refreshBtn">Refresh</button>
    <div id="lbStatus">connecting…</div>
  </div>
  <canvas id="game" width="400" height="600"></canvas>
  <div id="panel">
    <h2>Your Bird</h2>
    <canvas id="preview" width="160" height="110"></canvas>

    <details class="section" open>
      <summary>Color</summary>
      <div class="section-body">
        <div class="row" style="margin-top:0;"><label>Custom</label><input type="color" id="bodyColor" value="#f7d51d"></div>
        <div class="swatches" id="swatches"></div>
      </div>
    </details>

    <details class="section" open>
      <summary>Style</summary>
      <div class="section-body">
        <div class="styles" id="styles"></div>
      </div>
    </details>

    <details class="section">
      <summary>Hat</summary>
      <div class="section-body">
        <div class="hat-tabs" id="hatTabs"></div>
        <div class="styles" id="hats"></div>
      </div>
    </details>

    <details class="section">
      <summary>Audio</summary>
      <div class="section-body">
        <div class="row"><label>Music</label><div class="toggle on" id="musicToggle"></div></div>
        <div class="row"><label>Sound FX</label><div class="toggle on" id="sfxToggle"></div></div>
        <div class="row"><label>Volume</label><input type="range" id="volume" min="0" max="100" value="50"></div>
      </div>
    </details>
  </div>
</div>
<div id="hint">SPACE / ↑ / CLICK to flap &nbsp;·&nbsp; R to restart</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // ===== Game constants (tuned for nicer feel) =====
  const GROUND_H = 80;
  const GRAVITY = 0.22;
  const FLAP = -5.5;
  const MAX_FALL = 7.5;
  const PIPE_W = 60;
  const PIPE_GAP = 150;
  const PIPE_SPEED = 2.2;
  const PIPE_INTERVAL = 95;
  const BIRD_X = 90;
  const BIRD_R = 14;

  const STATE_READY = 0;
  const STATE_PLAY = 1;
  const STATE_OVER = 2;

  let state, bird, pipes, frame, score, best, groundOffset, overTimer, runStartedAt, runDuration, runToken;
  best = parseInt(localStorage.getItem('flappy_best') || '0', 10);

  // ===== Leaderboard =====
  // Same-origin by default; override by setting window.LEADERBOARD_URL
  const API_BASE = (window.LEADERBOARD_URL || '').replace(/\/$/, '');
  const lb = {
    online: false,
    list: [],
    submitted: false,
  };
  const nameInput = document.getElementById('nameInput');
  nameInput.value = localStorage.getItem('flappy_name') || '';
  nameInput.addEventListener('input', () => {
    localStorage.setItem('flappy_name', nameInput.value.trim().slice(0, 16));
  });
  const lbListEl = document.getElementById('lbList');
  const lbStatusEl = document.getElementById('lbStatus');
  document.getElementById('refreshBtn').addEventListener('click', fetchScores);

  function localScores() {
    try { return JSON.parse(localStorage.getItem('flappy_local_lb') || '[]'); }
    catch { return []; }
  }
  function saveLocalScores(list) {
    localStorage.setItem('flappy_local_lb', JSON.stringify(list.slice(0, 20)));
  }
  // One-time migration: dedupe any pre-existing local entries.
  saveLocalScores(dedupeByName(localScores()));

  async function fetchScores() {
    lbStatusEl.textContent = 'loading…';
    try {
      const res = await fetch(API_BASE + '/api/scores', { cache: 'no-store' });
      if (!res.ok) throw new Error('http ' + res.status);
      lb.list = await res.json();
      lb.online = true;
      lbStatusEl.textContent = 'online · global scores';
    } catch {
      lb.online = false;
      lb.list = localScores();
      lbStatusEl.textContent = 'offline · local only';
    }
    renderLeaderboard();
  }

  // Pre-fetch a session token so it's ready before the player finishes.
  // Tokens are reusable across all games in this browser session.
  let tokenFetchInFlight = null;
  function ensureToken(retries) {
    if (retries == null) retries = 2;
    if (runToken) return Promise.resolve(runToken);
    if (tokenFetchInFlight) return tokenFetchInFlight;
    tokenFetchInFlight = fetch(API_BASE + '/api/session', { method: 'POST' })
      .then(function (r) { return r.ok ? r.json() : Promise.reject(new Error('http ' + r.status)); })
      .then(function (d) { if (d && d.token) runToken = d.token; return runToken; })
      .catch(function () {
        if (retries > 0) {
          return new Promise(function (res) { setTimeout(res, 800); })
            .then(function () { tokenFetchInFlight = null; return ensureToken(retries - 1); });
        }
        return null;
      })
      .finally(function () { tokenFetchInFlight = null; });
    return tokenFetchInFlight;
  }
  ensureToken();

  async function submitScore(score) {
    const name = (nameInput.value || '').trim().slice(0, 16) || 'Anon';
    const skinPayload = { color: skin.color, style: skin.style, hat: skin.hat };
    if (lb.online) {
      // Make sure we have a token; if the page-load fetch failed, try again now.
      if (!runToken) await ensureToken();
      try {
        const res = await fetch(API_BASE + '/api/scores', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, score, skin: skinPayload, token: runToken }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const reason = data.error || ('http ' + res.status);
          // If the session is bad, drop it so we fetch a new one for the next game.
          if (reason === 'invalid or missing session' ||
              reason === 'session expired' ||
              reason === 'session exhausted' ||
              reason === 'session ip mismatch') {
            runToken = null;
            ensureToken();
          }
          if (res.status === 400 && reason === 'too fast') {
            lbStatusEl.textContent = 'rejected: too fast (anti-cheat)';
          } else if (reason.includes('session')) {
            lbStatusEl.textContent = 'rejected: ' + reason + ' — please retry';
          } else {
            lbStatusEl.textContent = 'rejected: ' + reason;
          }
          return;
        }
        lb.list = data.top || [];
        lbStatusEl.textContent = 'online · global scores';
        renderLeaderboard(name, score);
        return;
      } catch {
        lb.online = false;
        lbStatusEl.textContent = 'offline · local only';
      }
    }
    const list = localScores();
    list.push({ name, score, skin: skinPayload, at: Date.now() });
    const deduped = dedupeByName(list);
    saveLocalScores(deduped);
    lb.list = deduped.slice(0, 20);
    renderLeaderboard(name, score);
  }

  function dedupeByName(list) {
    const best = new Map();
    for (const e of list) {
      const key = (e.name || '').trim().toLowerCase();
      if (!key) continue;
      const prev = best.get(key);
      if (!prev || e.score > prev.score) best.set(key, e);
    }
    return [...best.values()].sort((a, b) => b.score - a.score);
  }

  function renderLeaderboard(highlightName, highlightScore) {
    lbListEl.innerHTML = '';
    if (!lb.list.length) {
      const li = document.createElement('li');
      li.style.opacity = '0.6';
      li.textContent = 'No scores yet — be the first!';
      lbListEl.appendChild(li);
      return;
    }
    lb.list.forEach((entry, i) => {
      const li = document.createElement('li');
      if (highlightName && entry.name === highlightName && entry.score === highlightScore) {
        li.className = 'me';
      }
      const rank = document.createElement('span');
      rank.className = 'rank';
      rank.textContent = (i + 1) + '.';
      const av = document.createElement('canvas');
      av.className = 'avatar';
      av.width = 36; av.height = 36;
      const ac = av.getContext('2d');
      drawBirdAt(ac, 18, 22, entry.skin || {}, { rot: 0, flapTimer: 0, frame: 0 });
      const nm = document.createElement('span');
      nm.className = 'name';
      nm.textContent = entry.name;
      const sc = document.createElement('span');
      sc.className = 'score';
      sc.textContent = entry.score;
      li.appendChild(rank);
      li.appendChild(av);
      li.appendChild(nm);
      li.appendChild(sc);
      lbListEl.appendChild(li);
    });
  }

  fetchScores();

  // ===== Customization =====
  const PRESETS = ['#f7d51d','#ff6b6b','#5ec8ff','#7cf26b','#c77dff','#ff9b29','#ffffff','#222222','#ff4fa3','#39e6c8'];
  const STYLES = ['Classic','Round','Sleek','Angry'];
  const HAT_CATEGORIES = {
    'All': null,
    'Royalty': ['Crown','Royal Crown','Top Hat','Fedora'],
    'Fun': ['Party','Wizard','Cap','Beanie','Halo','Propeller','Bow'],
    'Adventure': ['Cowboy','Pirate','Knight'],
    'Goofy': ['Flower','Banana','Leaf','Cone','Egg','Plant','Devil','Antenna','Tin Foil'],
    'Face': ['Mustache'],
  };
  const HATS = ['None', ...Object.values(HAT_CATEGORIES).filter(Boolean).flat()];
  const saved = JSON.parse(localStorage.getItem('flappy_skin') || '{}');
  const skin = {
    color: saved.color || '#f7d51d',
    style: saved.style || 'Classic',
    hat: saved.hat || 'None'
  };
  function saveSkin() {
    localStorage.setItem('flappy_skin', JSON.stringify(skin));
    renderPreview();
  }

  // Live preview canvas
  const previewCanvas = document.getElementById('preview');
  const previewCtx = previewCanvas.getContext('2d');
  let previewFrame = 0;
  function renderPreview() {
    previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
    drawBirdAt(
      previewCtx,
      previewCanvas.width / 2,
      previewCanvas.height / 2 + 6 + Math.sin(previewFrame / 20) * 3,
      skin,
      { rot: 0, flapTimer: (previewFrame % 60) < 10 ? 8 : 0, frame: previewFrame }
    );
  }
  setInterval(() => { previewFrame++; renderPreview(); }, 50);

  // Swatches UI
  const swatchEl = document.getElementById('swatches');
  PRESETS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'swatch' + (c === skin.color ? ' active' : '');
    d.style.background = c;
    d.dataset.color = c;
    d.addEventListener('click', () => {
      skin.color = c;
      document.getElementById('bodyColor').value = c;
      [...swatchEl.children].forEach(s => s.classList.toggle('active', s.dataset.color === c));
      saveSkin();
    });
    swatchEl.appendChild(d);
  });
  const colorInput = document.getElementById('bodyColor');
  colorInput.value = skin.color;
  colorInput.addEventListener('input', e => {
    skin.color = e.target.value;
    [...swatchEl.children].forEach(s => s.classList.remove('active'));
    saveSkin();
  });

  // Styles UI
  const stylesEl = document.getElementById('styles');
  STYLES.forEach(s => {
    const b = document.createElement('button');
    b.className = 'style-btn' + (s === skin.style ? ' active' : '');
    b.textContent = s;
    b.addEventListener('click', () => {
      skin.style = s;
      [...stylesEl.children].forEach(x => x.classList.toggle('active', x.textContent === s));
      saveSkin();
    });
    stylesEl.appendChild(b);
  });

  // Hats UI with category tabs
  const hatsEl = document.getElementById('hats');
  const hatTabsEl = document.getElementById('hatTabs');
  let activeHatCategory = 'All';

  function renderHatButtons() {
    hatsEl.innerHTML = '';
    const filter = HAT_CATEGORIES[activeHatCategory];
    const list = filter ? ['None', ...filter] : HATS;
    list.forEach(h => {
      const b = document.createElement('button');
      b.className = 'style-btn' + (h === skin.hat ? ' active' : '');
      b.textContent = h;
      b.addEventListener('click', () => {
        skin.hat = h;
        [...hatsEl.children].forEach(x => x.classList.toggle('active', x.textContent === h));
        saveSkin();
      });
      hatsEl.appendChild(b);
    });
  }

  Object.keys(HAT_CATEGORIES).forEach(cat => {
    const t = document.createElement('button');
    t.className = 'hat-tab' + (cat === activeHatCategory ? ' active' : '');
    t.textContent = cat;
    t.addEventListener('click', () => {
      activeHatCategory = cat;
      [...hatTabsEl.children].forEach(x => x.classList.toggle('active', x.textContent === cat));
      renderHatButtons();
    });
    hatTabsEl.appendChild(t);
  });
  renderHatButtons();
  renderPreview();

  // ===== Audio =====
  const audio = {
    ctx: null,
    musicOn: localStorage.getItem('flappy_music') !== '0',
    sfxOn: localStorage.getItem('flappy_sfx') !== '0',
    volume: parseInt(localStorage.getItem('flappy_vol') || '50', 10) / 100,
    masterGain: null,
    musicGain: null,
    musicTimer: null,
    musicStep: 0,
  };

  function ensureAudio() {
    if (audio.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    audio.ctx = new AC();
    audio.masterGain = audio.ctx.createGain();
    audio.masterGain.gain.value = audio.volume;
    audio.masterGain.connect(audio.ctx.destination);
    audio.musicGain = audio.ctx.createGain();
    audio.musicGain.gain.value = 0.35;
    audio.musicGain.connect(audio.masterGain);
    if (audio.musicOn) startMusic();
  }

  function tone(freq, dur, type, gain, when) {
    if (!audio.ctx) return;
    const t = (when || audio.ctx.currentTime);
    const o = audio.ctx.createOscillator();
    const g = audio.ctx.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gain || 0.2, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(audio.musicGain);
    o.start(t);
    o.stop(t + dur + 0.02);
    return { o, g };
  }

  function sfxFlap() {
    if (!audio.sfxOn || !audio.ctx) return;
    const t = audio.ctx.currentTime;
    const o = audio.ctx.createOscillator();
    const g = audio.ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(620, t);
    o.frequency.exponentialRampToValueAtTime(820, t + 0.08);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.25, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    o.connect(g).connect(audio.masterGain);
    o.start(t); o.stop(t + 0.14);
  }
  function sfxScore() {
    if (!audio.sfxOn || !audio.ctx) return;
    const t = audio.ctx.currentTime;
    [880, 1320].forEach((f, i) => {
      const o = audio.ctx.createOscillator();
      const g = audio.ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(f, t + i * 0.06);
      g.gain.setValueAtTime(0.0001, t + i * 0.06);
      g.gain.linearRampToValueAtTime(0.25, t + i * 0.06 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.06 + 0.18);
      o.connect(g).connect(audio.masterGain);
      o.start(t + i * 0.06); o.stop(t + i * 0.06 + 0.2);
    });
  }
  function sfxHit() {
    if (!audio.sfxOn || !audio.ctx) return;
    const t = audio.ctx.currentTime;
    const o = audio.ctx.createOscillator();
    const g = audio.ctx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(220, t);
    o.frequency.exponentialRampToValueAtTime(60, t + 0.4);
    g.gain.setValueAtTime(0.4, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
    o.connect(g).connect(audio.masterGain);
    o.start(t); o.stop(t + 0.55);
  }

  // Simple looping melody (cheerful 8-bit feel)
  // Notes (Hz): C5=523.25, D5=587.33, E5=659.25, G5=783.99, A5=880, C6=1046.5, B4=493.88, F5=698.46
  const MELODY = [
    [523.25, 0.25],[659.25, 0.25],[783.99, 0.25],[1046.5, 0.25],
    [880, 0.25],[783.99, 0.25],[659.25, 0.25],[523.25, 0.25],
    [587.33, 0.25],[698.46, 0.25],[880, 0.25],[1046.5, 0.25],
    [880, 0.5],[783.99, 0.5],
  ];
  const BASS = [
    [130.81, 0.5],[164.81, 0.5],[196.0, 0.5],[164.81, 0.5],
    [146.83, 0.5],[174.61, 0.5],[220.0, 0.5],[174.61, 0.5],
  ];

  function startMusic() {
    if (!audio.ctx || !audio.musicOn) return;
    stopMusic();
    let melodyIdx = 0, bassIdx = 0;
    let melodyTime = audio.ctx.currentTime + 0.05;
    let bassTime = audio.ctx.currentTime + 0.05;

    function scheduleMelody() {
      if (!audio.musicOn) return;
      const ahead = audio.ctx.currentTime + 1.0;
      while (melodyTime < ahead) {
        const [f, d] = MELODY[melodyIdx % MELODY.length];
        tone(f, d * 0.9, 'square', 0.12, melodyTime);
        melodyTime += d;
        melodyIdx++;
      }
      while (bassTime < ahead) {
        const [f, d] = BASS[bassIdx % BASS.length];
        tone(f, d * 0.9, 'triangle', 0.18, bassTime);
        bassTime += d;
        bassIdx++;
      }
    }
    scheduleMelody();
    audio.musicTimer = setInterval(scheduleMelody, 250);
  }
  function stopMusic() {
    if (audio.musicTimer) clearInterval(audio.musicTimer);
    audio.musicTimer = null;
  }

  // Audio UI
  const musicToggle = document.getElementById('musicToggle');
  const sfxToggle = document.getElementById('sfxToggle');
  const volumeEl = document.getElementById('volume');
  if (!audio.musicOn) musicToggle.classList.remove('on');
  if (!audio.sfxOn) sfxToggle.classList.remove('on');
  volumeEl.value = Math.round(audio.volume * 100);

  musicToggle.addEventListener('click', () => {
    audio.musicOn = !audio.musicOn;
    musicToggle.classList.toggle('on', audio.musicOn);
    localStorage.setItem('flappy_music', audio.musicOn ? '1' : '0');
    if (audio.musicOn) { ensureAudio(); startMusic(); } else { stopMusic(); }
  });
  sfxToggle.addEventListener('click', () => {
    audio.sfxOn = !audio.sfxOn;
    sfxToggle.classList.toggle('on', audio.sfxOn);
    localStorage.setItem('flappy_sfx', audio.sfxOn ? '1' : '0');
  });
  volumeEl.addEventListener('input', e => {
    audio.volume = e.target.value / 100;
    if (audio.masterGain) audio.masterGain.gain.value = audio.volume;
    localStorage.setItem('flappy_vol', e.target.value);
  });

  // ===== Game logic =====
  function reset() {
    state = STATE_READY;
    bird = { x: BIRD_X, y: H / 2, v: 0, rot: 0, flapTimer: 0 };
    pipes = [];
    frame = 0;
    score = 0;
    groundOffset = 0;
    overTimer = 0;
    lb.submitted = false;
    bgState.cur = 0;
    bgState.nxt = 0;
    bgState.t = 0;
    bgState.active = false;
    bgState.lastBgScore = 0;
  }

  function flap() {
    ensureAudio();
    if (audio.ctx && audio.ctx.state === 'suspended') audio.ctx.resume();
    if (state === STATE_READY) {
      state = STATE_PLAY;
      runStartedAt = Date.now();
      // Make sure a session token is available (it's pre-fetched at load too).
      ensureToken();
    }
    if (state === STATE_PLAY) {
      bird.v = FLAP;
      bird.flapTimer = 8;
      sfxFlap();
    } else if (state === STATE_OVER) {
      if (overTimer > 30) reset();
    }
  }

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.key === ' ' || e.key === 'ArrowUp') {
      e.preventDefault();
      flap();
    } else if (e.code === 'KeyR') {
      reset();
    }
  });
  canvas.addEventListener('mousedown', flap);
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); }, { passive: false });

  function spawnPipe() {
    const margin = 50;
    const minTop = margin;
    const maxTop = H - GROUND_H - PIPE_GAP - margin;
    const top = Math.random() * (maxTop - minTop) + minTop;
    pipes.push({ x: W + 10, top, passed: false });
  }

  function die() {
    if (state !== STATE_PLAY) return;
    state = STATE_OVER;
    overTimer = 0;
    runDuration = runStartedAt ? Date.now() - runStartedAt : 0;
    sfxHit();
    if (score > best) {
      best = score;
      localStorage.setItem('flappy_best', String(best));
    }
    if (score > 0 && !lb.submitted) {
      lb.submitted = true;
      submitScore(score);
    }
  }

  function update() {
    if (state === STATE_PLAY) {
      frame++;
      bird.v += GRAVITY;
      if (bird.v > MAX_FALL) bird.v = MAX_FALL;
      bird.y += bird.v;
      bird.rot = Math.max(-0.5, Math.min(1.4, bird.v / 10));
      if (bird.flapTimer > 0) bird.flapTimer--;

      if (frame % PIPE_INTERVAL === 0) spawnPipe();

      for (const p of pipes) p.x -= PIPE_SPEED;
      pipes = pipes.filter(p => p.x + PIPE_W > -20);

      for (const p of pipes) {
        if (!p.passed && p.x + PIPE_W < bird.x - BIRD_R) {
          p.passed = true;
          score++;
          sfxScore();
          if (score % 10 === 0 && score !== bgState.lastBgScore) {
            bgState.lastBgScore = score;
            triggerBgTransition();
          }
        }
        if (bird.x + BIRD_R > p.x && bird.x - BIRD_R < p.x + PIPE_W) {
          if (bird.y - BIRD_R < p.top || bird.y + BIRD_R > p.top + PIPE_GAP) {
            die();
          }
        }
      }
      if (bird.y + BIRD_R >= H - GROUND_H) {
        bird.y = H - GROUND_H - BIRD_R;
        die();
      }
      if (bird.y - BIRD_R < 0) {
        bird.y = BIRD_R;
        bird.v = 0;
      }
      groundOffset = (groundOffset + PIPE_SPEED) % 24;
    } else if (state === STATE_READY) {
      bird.y = H / 2 + Math.sin(frame / 12) * 6;
      frame++;
      groundOffset = (groundOffset + PIPE_SPEED) % 24;
    } else if (state === STATE_OVER) {
      overTimer++;
      bird.v += GRAVITY;
      if (bird.v > MAX_FALL) bird.v = MAX_FALL;
      bird.y += bird.v;
      bird.rot = Math.min(1.5, bird.rot + 0.05);
      if (bird.y + BIRD_R > H - GROUND_H) {
        bird.y = H - GROUND_H - BIRD_R;
        bird.v = 0;
      }
    }
  }

  const bgState = {
    cur: 0,
    nxt: 0,
    t: 0, // 0..1 transition progress
    active: false,
    lastBgScore: 0,
    duration: 90, // frames
  };

  function triggerBgTransition() {
    if (bgState.active) {
      // snap to current target if mid-transition
      bgState.cur = bgState.nxt;
    }
    let nxt;
    do { nxt = Math.floor(Math.random() * THEMES.length); } while (nxt === bgState.cur);
    bgState.nxt = nxt;
    bgState.t = 0;
    bgState.active = true;
  }

  function updateBgTransition() {
    if (!bgState.active) return;
    bgState.t += 1 / bgState.duration;
    if (bgState.t >= 1) {
      bgState.cur = bgState.nxt;
      bgState.t = 0;
      bgState.active = false;
    }
  }

  function lerpHex(a, b, t) {
    const pa = parseInt(a.slice(1), 16);
    const pb = parseInt(b.slice(1), 16);
    const ar = (pa >> 16) & 0xff, ag = (pa >> 8) & 0xff, ab = pa & 0xff;
    const br = (pb >> 16) & 0xff, bg = (pb >> 8) & 0xff, bb = pb & 0xff;
    const r = Math.round(ar + (br - ar) * t);
    const g = Math.round(ag + (bg - ag) * t);
    const b2 = Math.round(ab + (bb - ab) * t);
    return `rgb(${r},${g},${b2})`;
  }

  // Smoothstep easing for nicer transitions.
  function easeT() {
    const t = bgState.t;
    return t * t * (3 - 2 * t);
  }

  function drawBackground() {
    const cur = THEMES[bgState.cur];
    const nxt = THEMES[bgState.nxt];
    const t = bgState.active ? easeT() : 0;

    const skyTop = lerpHex(cur.skyTop, nxt.skyTop, t);
    const skyBot = lerpHex(cur.skyBot, nxt.skyBot, t);
    const g = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
    g.addColorStop(0, skyTop);
    g.addColorStop(1, skyBot);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H - GROUND_H);

    // Crossfade decorations
    if (t < 1) {
      ctx.globalAlpha = 1 - t;
      cur._a = 1 - t; cur.decorate(frame); cur._a = 1;
    }
    if (t > 0) {
      ctx.globalAlpha = t;
      nxt._a = t; nxt.decorate(frame); nxt._a = 1;
    }
    ctx.globalAlpha = 1;
  }

  function drawPipes() {
    for (const p of pipes) {
      drawPipe(p.x, p.top, true);
      drawPipe(p.x, p.top + PIPE_GAP, false);
    }
  }
  function drawPipe(x, gapY, isTop) {
    const lipH = 24;
    const lipW = PIPE_W + 8;
    if (isTop) {
      pipeBody(x, 0, PIPE_W, gapY - lipH);
      pipeLip(x - 4, gapY - lipH, lipW, lipH);
    } else {
      pipeBody(x, gapY + lipH, PIPE_W, H - GROUND_H - (gapY + lipH));
      pipeLip(x - 4, gapY, lipW, lipH);
    }
  }
  function pipeBody(x, y, w, h) {
    const g = ctx.createLinearGradient(x, 0, x + w, 0);
    g.addColorStop(0, '#5fa733');
    g.addColorStop(0.4, '#9be24c');
    g.addColorStop(0.6, '#82c93a');
    g.addColorStop(1, '#3a7a1f');
    ctx.fillStyle = g;
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#2e5f17';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
  }
  function pipeLip(x, y, w, h) {
    const g = ctx.createLinearGradient(x, 0, x + w, 0);
    g.addColorStop(0, '#5fa733');
    g.addColorStop(0.4, '#a8eb55');
    g.addColorStop(0.6, '#8ed040');
    g.addColorStop(1, '#3a7a1f');
    ctx.fillStyle = g;
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#2e5f17';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
  }

  function drawGround() {
    const cur = THEMES[bgState.cur];
    const nxt = THEMES[bgState.nxt];
    const t = bgState.active ? easeT() : 0;
    const dirt = lerpHex(cur.groundDirt, nxt.groundDirt, t);
    const top = lerpHex(cur.groundTop, nxt.groundTop, t);
    const line = lerpHex(cur.groundLine, nxt.groundLine, t);
    const slope = lerpHex(cur.groundSlope, nxt.groundSlope, t);

    ctx.fillStyle = dirt;
    ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
    ctx.fillStyle = top;
    ctx.fillRect(0, H - GROUND_H, W, 14);
    ctx.fillStyle = line;
    ctx.fillRect(0, H - GROUND_H + 14, W, 4);
    ctx.fillStyle = slope;
    for (let i = -1; i < W / 24 + 1; i++) {
      const x = i * 24 - groundOffset;
      ctx.beginPath();
      ctx.moveTo(x, H - GROUND_H + 20);
      ctx.lineTo(x + 12, H - GROUND_H + 20);
      ctx.lineTo(x + 6, H);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Helpers for color shading
  function shade(hex, amt) {
    const c = hex.replace('#','');
    const num = parseInt(c.length === 3 ? c.split('').map(x=>x+x).join('') : c, 16);
    let r = (num >> 16) + amt;
    let g = ((num >> 8) & 0xff) + amt;
    let b = (num & 0xff) + amt;
    r = Math.max(0, Math.min(255, r));
    g = Math.max(0, Math.min(255, g));
    b = Math.max(0, Math.min(255, b));
    return `rgb(${r},${g},${b})`;
  }

  function drawBird() {
    drawBirdAt(ctx, bird.x, bird.y, skin, {
      rot: bird.rot, flapTimer: bird.flapTimer, frame: frame
    });
  }

  // Reusable bird renderer — used by main game and leaderboard avatars.
  function drawBirdAt(c, cx, cy, sk, opts) {
    opts = opts || {};
    const rot = opts.rot || 0;
    const flapTimer = opts.flapTimer || 0;
    const frameNum = opts.frame || 0;
    const style = (sk && sk.style) || 'Classic';
    const body = (sk && sk.color) || '#f7d51d';
    const dark = shade(body, -60);
    const light = shade(body, 60);
    const wingY = flapTimer > 4 ? -6 : (flapTimer > 0 ? 0 : 4);

    c.save();
    c.translate(cx, cy);
    c.rotate(rot);
    c.strokeStyle = '#000';
    c.lineWidth = 2;

    if (style === 'Classic') {
      c.fillStyle = body;
      c.beginPath(); c.arc(0, 0, BIRD_R, 0, Math.PI * 2); c.fill(); c.stroke();
      c.fillStyle = light;
      c.beginPath(); c.arc(-2, 4, BIRD_R - 5, 0, Math.PI * 2); c.fill();
      c.fillStyle = dark;
      c.beginPath(); c.ellipse(-3, wingY, 8, 5, 0, 0, Math.PI * 2); c.fill(); c.stroke();
      drawEyeOn(c, 5, -4, 5, 2.5);
      drawBeakOn(c, '#ff9b29');
    } else if (style === 'Round') {
      c.fillStyle = body;
      c.beginPath(); c.arc(0, 0, BIRD_R + 1, 0, Math.PI * 2); c.fill(); c.stroke();
      c.fillStyle = light;
      c.beginPath(); c.arc(0, 5, BIRD_R - 4, 0, Math.PI * 2); c.fill();
      c.fillStyle = dark;
      c.beginPath(); c.ellipse(-4, wingY + 1, 7, 6, 0, 0, Math.PI * 2); c.fill(); c.stroke();
      drawEyeOn(c, 6, -3, 4.5, 2.2);
      drawBeakOn(c, '#ffb84d');
    } else if (style === 'Sleek') {
      c.fillStyle = body;
      c.beginPath(); c.ellipse(0, 0, BIRD_R + 2, BIRD_R - 3, 0, 0, Math.PI * 2); c.fill(); c.stroke();
      c.fillStyle = light;
      c.beginPath(); c.ellipse(-1, 3, BIRD_R - 3, BIRD_R - 7, 0, 0, Math.PI * 2); c.fill();
      c.fillStyle = dark;
      c.beginPath(); c.ellipse(-5, wingY, 9, 4, -0.2, 0, Math.PI * 2); c.fill(); c.stroke();
      drawEyeOn(c, 7, -3, 4, 2);
      drawBeakOn(c, '#ffcb52', 22);
    } else if (style === 'Angry') {
      c.fillStyle = body;
      c.beginPath(); c.arc(0, 0, BIRD_R, 0, Math.PI * 2); c.fill(); c.stroke();
      c.fillStyle = light;
      c.beginPath(); c.arc(-2, 4, BIRD_R - 5, 0, Math.PI * 2); c.fill();
      c.fillStyle = dark;
      c.beginPath(); c.ellipse(-3, wingY, 8, 5, 0, 0, Math.PI * 2); c.fill(); c.stroke();
      drawEyeOn(c, 5, -4, 5, 2.5);
      c.strokeStyle = '#000'; c.lineWidth = 3;
      c.beginPath(); c.moveTo(-1, -10); c.lineTo(11, -6); c.stroke();
      c.lineWidth = 2;
      drawBeakOn(c, '#ff5b29');
    }
    drawHatOn(c, sk && sk.hat, frameNum);
    c.restore();
  }

  // Hat / accessory drawing — drawn in bird-local rotated space.
  // Bird body radius ~14, top of head at y = -BIRD_R (= -14).
  function drawHatOn(c, hat, frameNum) {
    if (!hat || hat === 'None') return;
    c.lineWidth = 2;
    c.strokeStyle = '#000';
    const top = -BIRD_R; // -14

    if (hat === 'Crown') {
      c.fillStyle = '#ffd84d';
      c.beginPath();
      c.moveTo(-10, top);
      c.lineTo(-10, top - 10);
      c.lineTo(-6, top - 4);
      c.lineTo(-2, top - 12);
      c.lineTo(2, top - 4);
      c.lineTo(6, top - 12);
      c.lineTo(10, top - 4);
      c.lineTo(10, top - 10);
      c.lineTo(10, top);
      c.closePath();
      c.fill(); c.stroke();
      c.fillStyle = '#ff3b6b';
      c.beginPath(); c.arc(0, top - 2, 1.6, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#5ec8ff';
      c.beginPath(); c.arc(-7, top - 2, 1.2, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(7, top - 2, 1.2, 0, Math.PI * 2); c.fill();
    } else if (hat === 'Royal Crown') {
      // taller, regal crown with red velvet base
      c.fillStyle = '#c8232c';
      c.fillRect(-11, top - 4, 22, 4);
      c.strokeRect(-11, top - 4, 22, 4);
      c.fillStyle = '#ffd84d';
      c.beginPath();
      c.moveTo(-11, top - 4);
      c.lineTo(-11, top - 16);
      c.lineTo(-6, top - 9);
      c.lineTo(-3, top - 18);
      c.lineTo(0, top - 10);
      c.lineTo(3, top - 18);
      c.lineTo(6, top - 9);
      c.lineTo(11, top - 16);
      c.lineTo(11, top - 4);
      c.closePath();
      c.fill(); c.stroke();
      // jewels
      c.fillStyle = '#5ec8ff'; c.beginPath(); c.arc(-7, top - 14, 1.3, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#ff3b6b'; c.beginPath(); c.arc(0, top - 16, 1.6, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#7cf26b'; c.beginPath(); c.arc(7, top - 14, 1.3, 0, Math.PI * 2); c.fill();
    } else if (hat === 'Top Hat') {
      c.fillStyle = '#222';
      c.fillRect(-12, top - 2, 24, 3);
      c.strokeRect(-12, top - 2, 24, 3);
      c.fillRect(-7, top - 14, 14, 12);
      c.strokeRect(-7, top - 14, 14, 12);
      c.fillStyle = '#c8232c';
      c.fillRect(-7, top - 5, 14, 2);
    } else if (hat === 'Fedora') {
      c.fillStyle = '#5a3a1f';
      c.beginPath(); c.ellipse(0, top, 14, 3, 0, 0, Math.PI * 2); c.fill(); c.stroke();
      c.beginPath();
      c.moveTo(-8, top - 1);
      c.quadraticCurveTo(-9, top - 10, -2, top - 11);
      c.quadraticCurveTo(2, top - 13, 8, top - 11);
      c.quadraticCurveTo(9, top - 5, 8, top - 1);
      c.closePath();
      c.fill(); c.stroke();
      c.fillStyle = '#222';
      c.fillRect(-8, top - 3, 16, 2);
    } else if (hat === 'Party') {
      c.fillStyle = '#ff4fa3';
      c.beginPath();
      c.moveTo(-9, top); c.lineTo(9, top); c.lineTo(0, top - 18);
      c.closePath();
      c.fill(); c.stroke();
      c.fillStyle = '#fff';
      for (let i = 0; i < 3; i++) {
        c.beginPath();
        c.moveTo(-7 + i * 5, top - 1);
        c.lineTo(-3 + i * 5, top - 1);
        c.lineTo(0 + i * 3, top - 18 + i * 4);
        c.closePath();
        c.fill();
      }
      c.fillStyle = '#ffe14d';
      c.beginPath(); c.arc(0, top - 19, 2.5, 0, Math.PI * 2); c.fill(); c.stroke();
    } else if (hat === 'Wizard') {
      c.fillStyle = '#3a3aa8';
      c.beginPath();
      c.moveTo(-11, top); c.lineTo(11, top); c.lineTo(4, top - 22);
      c.quadraticCurveTo(2, top - 18, 6, top - 12);
      c.closePath();
      c.fill(); c.stroke();
      c.fillStyle = '#ffe14d';
      [[-3, top - 8], [2, top - 14], [-5, top - 3]].forEach(([sx, sy]) => {
        c.beginPath(); c.arc(sx, sy, 1.3, 0, Math.PI * 2); c.fill();
      });
      c.fillStyle = '#3a3aa8';
      c.fillRect(-13, top - 1, 26, 3);
      c.strokeRect(-13, top - 1, 26, 3);
    } else if (hat === 'Cap') {
      c.fillStyle = '#c8232c';
      c.beginPath(); c.ellipse(-2, top - 1, 10, 8, 0, Math.PI, 0); c.closePath();
      c.fill(); c.stroke();
      c.beginPath(); c.ellipse(6, top, 9, 3, 0, Math.PI, 0); c.closePath();
      c.fill(); c.stroke();
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(-2, top - 8, 1.4, 0, Math.PI * 2); c.fill();
    } else if (hat === 'Beanie') {
      c.fillStyle = '#5ec8ff';
      c.beginPath(); c.ellipse(0, top - 2, 11, 8, 0, Math.PI, 0); c.closePath();
      c.fill(); c.stroke();
      c.fillStyle = '#fff';
      c.fillRect(-11, top - 2, 22, 3);
      c.strokeRect(-11, top - 2, 22, 3);
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(0, top - 11, 3, 0, Math.PI * 2); c.fill(); c.stroke();
    } else if (hat === 'Halo') {
      c.strokeStyle = 'rgba(255,225,77,0.5)';
      c.lineWidth = 6;
      c.beginPath(); c.ellipse(0, top - 6, 11, 3.5, 0, 0, Math.PI * 2); c.stroke();
      c.strokeStyle = '#ffe14d';
      c.lineWidth = 3;
      c.beginPath(); c.ellipse(0, top - 6, 11, 3.5, 0, 0, Math.PI * 2); c.stroke();
    } else if (hat === 'Propeller') {
      c.fillStyle = '#3aa84a';
      c.beginPath(); c.ellipse(0, top - 1, 10, 7, 0, Math.PI, 0); c.closePath();
      c.fill(); c.stroke();
      c.fillStyle = '#c8232c';
      c.fillRect(-10, top - 1, 20, 2);
      c.fillStyle = '#222';
      c.fillRect(-1, top - 12, 2, 5);
      const spin = (frameNum || 0) * 0.5;
      c.save();
      c.translate(0, top - 12);
      c.rotate(spin);
      c.fillStyle = '#ffe14d';
      c.fillRect(-9, -1.5, 18, 3);
      c.strokeRect(-9, -1.5, 18, 3);
      c.restore();
    } else if (hat === 'Cowboy') {
      c.fillStyle = '#8b5a2b';
      c.beginPath(); c.ellipse(0, top, 16, 4, 0, 0, Math.PI * 2); c.fill(); c.stroke();
      c.beginPath();
      c.moveTo(-8, top - 1);
      c.quadraticCurveTo(-9, top - 12, 0, top - 13);
      c.quadraticCurveTo(9, top - 12, 8, top - 1);
      c.closePath();
      c.fill(); c.stroke();
      c.fillStyle = '#222';
      c.fillRect(-8, top - 3, 16, 2);
    } else if (hat === 'Pirate') {
      // bandana
      c.fillStyle = '#222';
      c.beginPath();
      c.moveTo(-13, top + 1);
      c.lineTo(13, top + 1);
      c.lineTo(11, top - 6);
      c.quadraticCurveTo(0, top - 9, -11, top - 6);
      c.closePath();
      c.fill(); c.stroke();
      // tied knot
      c.beginPath();
      c.moveTo(13, top - 1);
      c.lineTo(20, top - 4);
      c.lineTo(20, top + 4);
      c.closePath();
      c.fill(); c.stroke();
      // skull
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(0, top - 4, 2.5, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#222';
      c.beginPath(); c.arc(-1, top - 4, 0.6, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(1, top - 4, 0.6, 0, Math.PI * 2); c.fill();
    } else if (hat === 'Knight') {
      // helmet
      c.fillStyle = '#9aa3ad';
      c.beginPath();
      c.moveTo(-11, top + 2);
      c.lineTo(-11, top - 10);
      c.quadraticCurveTo(0, top - 16, 11, top - 10);
      c.lineTo(11, top + 2);
      c.closePath();
      c.fill(); c.stroke();
      // visor slit
      c.fillStyle = '#222';
      c.fillRect(-9, top - 5, 18, 2);
      // plume
      c.fillStyle = '#c8232c';
      c.beginPath();
      c.moveTo(0, top - 13);
      c.quadraticCurveTo(8, top - 22, 4, top - 26);
      c.quadraticCurveTo(0, top - 20, -2, top - 13);
      c.closePath();
      c.fill(); c.stroke();
    } else if (hat === 'Flower') {
      // stem
      c.strokeStyle = '#3aa84a';
      c.lineWidth = 2;
      c.beginPath(); c.moveTo(0, top); c.lineTo(0, top - 8); c.stroke();
      c.strokeStyle = '#000';
      // petals
      c.fillStyle = '#ff4fa3';
      [[0,-14],[5,-10],[5,-4],[0,0],[-5,-4],[-5,-10]].forEach(([px, py]) => {
        c.beginPath(); c.arc(px, top - 8 + py + 8, 3, 0, Math.PI * 2); c.fill(); c.stroke();
      });
      c.fillStyle = '#ffe14d';
      c.beginPath(); c.arc(0, top - 12, 2, 0, Math.PI * 2); c.fill(); c.stroke();
      // leaf
      c.fillStyle = '#3aa84a';
      c.beginPath(); c.ellipse(4, top - 4, 3, 1.5, 0.5, 0, Math.PI * 2); c.fill(); c.stroke();
    } else if (hat === 'Banana') {
      c.fillStyle = '#ffe14d';
      c.beginPath();
      c.moveTo(-12, top - 2);
      c.quadraticCurveTo(0, top - 14, 12, top - 2);
      c.quadraticCurveTo(0, top - 8, -12, top - 2);
      c.closePath();
      c.fill(); c.stroke();
      c.fillStyle = '#3b2a1a';
      c.fillRect(11, top - 3, 3, 2);
    } else if (hat === 'Leaf') {
      c.fillStyle = '#3aa84a';
      c.beginPath();
      c.moveTo(-10, top);
      c.quadraticCurveTo(-2, top - 16, 10, top - 2);
      c.quadraticCurveTo(0, top - 6, -10, top);
      c.closePath();
      c.fill(); c.stroke();
      c.strokeStyle = '#2a7a30';
      c.lineWidth = 1;
      c.beginPath(); c.moveTo(-8, top - 1); c.quadraticCurveTo(0, top - 8, 9, top - 3); c.stroke();
      c.lineWidth = 2;
      c.strokeStyle = '#000';
    } else if (hat === 'Cone') {
      c.fillStyle = '#ff7a1a';
      c.beginPath();
      c.moveTo(-9, top);
      c.lineTo(9, top);
      c.lineTo(2, top - 18);
      c.lineTo(-2, top - 18);
      c.closePath();
      c.fill(); c.stroke();
      c.fillStyle = '#fff';
      c.fillRect(-7, top - 5, 14, 2);
      c.fillRect(-5, top - 11, 10, 2);
      c.fillStyle = '#ff7a1a';
      c.fillRect(-10, top - 1, 20, 3);
      c.strokeRect(-10, top - 1, 20, 3);
    } else if (hat === 'Egg') {
      c.fillStyle = '#fff5dc';
      c.beginPath(); c.ellipse(0, top - 6, 10, 12, 0, 0, Math.PI * 2); c.fill(); c.stroke();
      c.fillStyle = '#d4b87a';
      [[-4, -10], [3, -4], [-2, -2], [5, -12], [-6, -6]].forEach(([sx, sy]) => {
        c.beginPath(); c.arc(sx, top + sy, 1.2, 0, Math.PI * 2); c.fill();
      });
    } else if (hat === 'Plant') {
      // pot
      c.fillStyle = '#a05a3a';
      c.beginPath();
      c.moveTo(-7, top); c.lineTo(7, top); c.lineTo(6, top - 6); c.lineTo(-6, top - 6);
      c.closePath();
      c.fill(); c.stroke();
      c.fillRect(-8, top - 8, 16, 3);
      c.strokeRect(-8, top - 8, 16, 3);
      // leaves
      c.fillStyle = '#3aa84a';
      c.beginPath(); c.ellipse(-4, top - 12, 3, 6, -0.5, 0, Math.PI * 2); c.fill(); c.stroke();
      c.beginPath(); c.ellipse(4, top - 12, 3, 6, 0.5, 0, Math.PI * 2); c.fill(); c.stroke();
      c.beginPath(); c.ellipse(0, top - 16, 3, 6, 0, 0, Math.PI * 2); c.fill(); c.stroke();
    } else if (hat === 'Devil') {
      c.fillStyle = '#c8232c';
      // left horn
      c.beginPath();
      c.moveTo(-8, top); c.lineTo(-3, top - 1); c.lineTo(-6, top - 10);
      c.closePath(); c.fill(); c.stroke();
      // right horn
      c.beginPath();
      c.moveTo(8, top); c.lineTo(3, top - 1); c.lineTo(6, top - 10);
      c.closePath(); c.fill(); c.stroke();
    } else if (hat === 'Antenna') {
      c.strokeStyle = '#222'; c.lineWidth = 1.5;
      c.beginPath(); c.moveTo(-3, top); c.lineTo(-5, top - 12); c.stroke();
      c.beginPath(); c.moveTo(3, top); c.lineTo(5, top - 12); c.stroke();
      c.lineWidth = 2; c.strokeStyle = '#000';
      c.fillStyle = '#ff4fa3';
      c.beginPath(); c.arc(-5, top - 13, 2, 0, Math.PI * 2); c.fill(); c.stroke();
      c.fillStyle = '#5ec8ff';
      c.beginPath(); c.arc(5, top - 13, 2, 0, Math.PI * 2); c.fill(); c.stroke();
    } else if (hat === 'Bow') {
      c.fillStyle = '#ff4fa3';
      // left loop
      c.beginPath();
      c.moveTo(0, top - 4); c.lineTo(-9, top - 9); c.lineTo(-9, top + 1); c.closePath();
      c.fill(); c.stroke();
      // right loop
      c.beginPath();
      c.moveTo(0, top - 4); c.lineTo(9, top - 9); c.lineTo(9, top + 1); c.closePath();
      c.fill(); c.stroke();
      // knot
      c.fillStyle = '#ff7ab8';
      c.fillRect(-2, top - 7, 4, 6);
      c.strokeRect(-2, top - 7, 4, 6);
    } else if (hat === 'Tin Foil') {
      c.fillStyle = '#bfc4cc';
      c.beginPath();
      c.moveTo(-11, top + 1);
      c.lineTo(-9, top - 4);
      c.lineTo(-5, top - 7);
      c.lineTo(0, top - 9);
      c.lineTo(5, top - 7);
      c.lineTo(9, top - 4);
      c.lineTo(11, top + 1);
      c.lineTo(8, top - 14);
      c.lineTo(-8, top - 14);
      c.closePath();
      c.fill(); c.stroke();
      // creases
      c.strokeStyle = '#7a8088'; c.lineWidth = 1;
      c.beginPath(); c.moveTo(-4, top - 13); c.lineTo(-2, top - 4); c.stroke();
      c.beginPath(); c.moveTo(3, top - 13); c.lineTo(5, top - 4); c.stroke();
      c.lineWidth = 2; c.strokeStyle = '#000';
    } else if (hat === 'Mustache') {
      c.fillStyle = '#3b2a1a';
      c.beginPath();
      c.moveTo(8, 4);
      c.quadraticCurveTo(12, 2, 16, 5);
      c.quadraticCurveTo(13, 7, 10, 7);
      c.quadraticCurveTo(7, 8, 4, 7);
      c.quadraticCurveTo(1, 8, -2, 7);
      c.quadraticCurveTo(-6, 7, -9, 5);
      c.quadraticCurveTo(-5, 2, -1, 4);
      c.quadraticCurveTo(3, 5, 8, 4);
      c.closePath();
      c.fill(); c.stroke();
    }
  }

  function drawEyeOn(c, x, y, r, pupilR) {
    c.fillStyle = '#fff';
    c.beginPath(); c.arc(x, y, r, 0, Math.PI * 2); c.fill(); c.stroke();
    c.fillStyle = '#000';
    c.beginPath(); c.arc(x + 2, y, pupilR, 0, Math.PI * 2); c.fill();
  }
  function drawBeakOn(c, color, len) {
    len = len || 20;
    c.fillStyle = color;
    c.beginPath();
    c.moveTo(10, -1);
    c.lineTo(len, 0);
    c.lineTo(10, 5);
    c.closePath();
    c.fill(); c.stroke();
  }

  function drawScore() {
    if (state === STATE_PLAY || state === STATE_OVER) {
      drawBigText(String(score), W / 2, 80, 48);
    }
  }
  function drawBigText(text, x, y, size) {
    ctx.font = `bold ${size}px "Segoe UI", Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.lineWidth = 5;
    ctx.strokeStyle = '#000';
    ctx.fillStyle = '#fff';
    ctx.strokeText(text, x, y);
    ctx.fillText(text, x, y);
  }
  function drawReady() {
    drawBigText('Flappy Bird', W / 2, 140, 38);
    ctx.font = 'bold 18px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#000';
    ctx.fillStyle = '#fff';
    const msg = 'Press SPACE / ↑ or Click to start';
    ctx.strokeText(msg, W / 2, 200);
    ctx.fillText(msg, W / 2, 200);
  }
  function drawGameOver() {
    const pw = 260, ph = 170;
    const px = (W - pw) / 2, py = 140;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    roundRect(px, py, pw, ph, 12, true, false);
    drawBigText('Game Over', W / 2, py + 50, 32);
    ctx.font = 'bold 20px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText(`Score: ${score}`, W / 2, py + 90);
    ctx.fillText(`Best: ${best}`, W / 2, py + 120);
    if (overTimer > 30) {
      ctx.font = '16px "Segoe UI", Arial, sans-serif';
      ctx.fillStyle = (Math.floor(overTimer / 20) % 2 === 0) ? '#fff' : '#ffd';
      ctx.fillText('Click or press R to restart', W / 2, py + 152);
    }
  }
  function roundRect(x, y, w, h, r, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
  }

  function render() {
    drawBackground();
    drawPipes();
    drawGround();
    drawBird();
    drawScore();
    if (state === STATE_READY) drawReady();
    if (state === STATE_OVER) drawGameOver();
  }

  function loop() {
    update();
    updateBgTransition();
    render();
    requestAnimationFrame(loop);
  }

  reset();
  loop();
})();
</script>
</body>
</html>
